name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write     # for GitHub release creation
  packages: write     # for ghcr.io image push

jobs:
  binaries:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install + build web (for server embed)
        run: cd web && npm ci && npm run build
      - name: Resolve version
        run: echo "VERSION=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_ENV
      - name: Cross-compile agents (linux+darwin × amd64+arm64)
        run: |
          for goos in linux darwin; do
            for goarch in amd64 arm64; do
              GOOS=$goos GOARCH=$goarch CGO_ENABLED=0 go build \
                -ldflags "-X github.com/hg-claw/Shepherd/internal/agentconfig.BuildVersion=${VERSION}" \
                -o internal/installer/bin/shepherd-agent-${goos}-${goarch} ./cmd/agent
            done
          done
      - name: Native server build for ${{ matrix.arch }}
        run: |
          mkdir -p dist
          CGO_ENABLED=1 \
            go build \
            -ldflags "-X github.com/hg-claw/Shepherd/internal/config.BuildVersion=${VERSION}" \
            -o dist/shepherd-server-linux-${{ matrix.arch }} \
            ./cmd/server
      - name: Package + checksum (linux server tarball)
        run: |
          cp internal/installer/bin/shepherd-agent-linux-${{ matrix.arch }} dist/
          tar -czf dist/shepherd-linux-${{ matrix.arch }}.tar.gz \
            -C dist shepherd-server-linux-${{ matrix.arch }} shepherd-agent-linux-${{ matrix.arch }}
          (cd dist && sha256sum shepherd-linux-${{ matrix.arch }}.tar.gz \
            > shepherd-linux-${{ matrix.arch }}.tar.gz.sha256)
      - name: Package + checksum (darwin agent tarball)
        run: |
          cp internal/installer/bin/shepherd-agent-darwin-${{ matrix.arch }} dist/
          tar -czf dist/shepherd-agent-darwin-${{ matrix.arch }}.tar.gz \
            -C dist shepherd-agent-darwin-${{ matrix.arch }}
          (cd dist && sha256sum shepherd-agent-darwin-${{ matrix.arch }}.tar.gz \
            > shepherd-agent-darwin-${{ matrix.arch }}.tar.gz.sha256)
      - uses: actions/upload-artifact@v7
        with:
          name: bins-${{ matrix.arch }}
          path: |
            dist/shepherd-linux-${{ matrix.arch }}.tar.gz
            dist/shepherd-linux-${{ matrix.arch }}.tar.gz.sha256
            dist/shepherd-agent-darwin-${{ matrix.arch }}.tar.gz
            dist/shepherd-agent-darwin-${{ matrix.arch }}.tar.gz.sha256

  # Each arch builds the image natively on its own runner — pre-fix this was
  # one job using QEMU emulation, which made the arm64 leg take ~25 minutes
  # because CGO + sqlite under QEMU is brutal. Each leg pushes by digest;
  # image-manifest below combines the two digests into the multi-arch tag.
  image:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        run: echo "VERSION=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_ENV
      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ env.VERSION }}
          cache-from: type=gha,scope=image-${{ matrix.arch }}
          cache-to: type=gha,scope=image-${{ matrix.arch }},mode=max
          outputs: type=image,name=ghcr.io/hg-claw/shepherd,push-by-digest=true,name-canonical=true,push=true
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          echo -n "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.arch }}
      - uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/${{ matrix.arch }}
          if-no-files-found: error
          retention-days: 1

  image-manifest:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        run: echo "VERSION=${{ github.event.inputs.tag || github.ref_name }}" >> $GITHUB_ENV
      - name: Combine per-arch digests into multi-arch tags
        working-directory: /tmp/digests
        run: |
          # Each digest file already contains "sha256:abc...", so we just
          # concatenate it onto the repo ref.
          docker buildx imagetools create \
            --tag ghcr.io/hg-claw/shepherd:${VERSION} \
            --tag ghcr.io/hg-claw/shepherd:latest \
            $(for f in *; do echo "ghcr.io/hg-claw/shepherd@$(cat $f)"; done)
      - name: Verify manifest
        run: docker buildx imagetools inspect ghcr.io/hg-claw/shepherd:${VERSION}

  release:
    needs: [binaries, image-manifest]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: bins-*
      - name: Flatten artifact tree
        run: |
          mkdir -p out
          mv dist/bins-*/* out/
          ls -la out/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            out/shepherd-linux-amd64.tar.gz
            out/shepherd-linux-amd64.tar.gz.sha256
            out/shepherd-linux-arm64.tar.gz
            out/shepherd-linux-arm64.tar.gz.sha256
            out/shepherd-agent-darwin-amd64.tar.gz
            out/shepherd-agent-darwin-amd64.tar.gz.sha256
            out/shepherd-agent-darwin-arm64.tar.gz
            out/shepherd-agent-darwin-arm64.tar.gz.sha256
