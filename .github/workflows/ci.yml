name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.5
          args: --timeout=5m
          # Disable action's built-in cache; setup-go above already caches
          # the module graph, and the action's cache key sometimes mismatches
          # under Go 1.25 leading to redundant downloads + context timeouts.
          skip-cache: true
      - name: go vet
        run: go vet ./...
      - name: go test -race
        run: go test -race ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: Install web deps
        run: cd web && npm ci
      - name: Vitest
        run: cd web && npm test
      - name: Build (typescript + vite)
        run: cd web && npm run build

  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'mobile/package-lock.json'
      - name: Install mobile deps
        run: cd mobile && npm ci
      - name: Typecheck
        run: cd mobile && npx tsc --noEmit
      - name: Lint
        run: cd mobile && npx eslint .
      - name: Jest
        run: cd mobile && npx jest --ci
