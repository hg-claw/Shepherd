services:
  shepherd:
    image: ghcr.io/hg-claw/shepherd:${SHEPHERD_TAG:-latest}
    restart: unless-stopped
    volumes:
      - shepherd_data:/data
    # required:false keeps this a no-op when --profile pg is NOT active
    # (postgres is itself profile-gated). With --profile pg, shepherd
    # waits for postgres to report healthy before starting — otherwise
    # it races the DB and dies on first connect.
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    environment:
      SERVER_HTTP_ADDR: ":8080"
      DATABASE_DRIVER: ${DATABASE_DRIVER:-sqlite}
      DATABASE_DSN: ${DATABASE_DSN:-file:/data/shepherd.db?_fk=1}
      DATA_DIR: ${DATA_DIR:-/data}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      AUTO_RECOVER_KEY: ${AUTO_RECOVER_KEY:-}
      SERVER_PUBLIC_URL: ${SERVER_PUBLIC_URL:-}
      AGENT_DISTRIBUTION: ${AGENT_DISTRIBUTION:-embedded}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "${SHEPHERD_PORT:-8080}:8080"

  postgres:
    image: postgres:16-alpine
    profiles: [pg]
    restart: unless-stopped
    environment:
      POSTGRES_DB: shepherd
      POSTGRES_USER: shepherd
      POSTGRES_PASSWORD: ${PG_PASSWORD:-shepherd}
    volumes:
      - shepherd_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shepherd -d shepherd"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  shepherd_data:
  shepherd_pg_data:
